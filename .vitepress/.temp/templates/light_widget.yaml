# ESPHome Light Widget Configuration
# Generated for Home Assistant integration

substitutions:
  device_name: "esphome_light_widget"
  friendly_name: "ESPHome Light Widget"
  light_entity: "${light.example_light}"  # This will be replaced

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platform: ESP32
  board: esp32dev

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable OTA updates
ota:
  password: !secret ota_password

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: !secret fallback_password

# PWM Output for dimmable lights
output:
  - platform: ledc
    pin: ${gpio_pin}
    id: light_output
    frequency: 1000Hz

# Light configuration
light:
  - platform: monochromatic
    name: ${friendly_name}
    id: main_light
    output: light_output
    restore_mode: RESTORE_DEFAULT_OFF
    
# Sensor
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    
  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s